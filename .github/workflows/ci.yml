name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pdt
          POSTGRES_USER: pdt
          POSTGRES_PASSWORD: pdt
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pdt -d pdt"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      POSTGRES_DB: pdt
      POSTGRES_USER: pdt
      POSTGRES_PASSWORD: pdt
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECRET_KEY: ci-secret-key

    defaults:
      run:
        working-directory: pdt

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pdt/requirements.txt

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-asyncio

      - run: python manage.py migrate --noinput

      - run: pytest -q

  lint-tf:
    name: terraform fmt + validate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
