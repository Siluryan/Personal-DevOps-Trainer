# Deploy to Production: build da imagem no runner do GitHub Actions, push
# no ECR e aplicação na EC2 (docker compose + pdt/docker-compose.prod.yml).
# Variáveis (ex.: ECR_REPOSITORY) devem estar no environment `prod` no GitHub
# (ou no repositório). Ambos os jobs usam `environment: prod` para enxergar
# as variables do environment. ecr_repository_url = output Terraform.
# GHA_DEPLOY_ROLE_ARN: OIDC com políticas ECR (Terraform).
name: Deploy Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "deploy/terraform/**"
      - ".github/workflows/terraform.yml"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem no ECR (vazio = commit SHA do run)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag || github.sha }}

jobs:
  build-and-push:
    name: Build and Push
    environment: prod
    runs-on: ubuntu-24.04
    env:
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Exigir ECR_REPOSITORY
        run: |
          if [ -z "${{ vars.ECR_REPOSITORY }}" ]; then
            echo '::error::Defina a variável ECR_REPOSITORY (ex.: saída ecr_repository_url do Terraform).'
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.GHA_DEPLOY_ROLE_ARN }}
          role-session-name: pdt-gha-build-ecr

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: pdt
          file: pdt/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REPOSITORY }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Imagem publicada
        run: |
          echo "Repositório: ${{ env.ECR_REPOSITORY }}"
          echo "Tag: ${{ env.IMAGE_TAG }}"
          echo "Imagem: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

  deploy:
    name: Deploy via SSM and Smoke Test
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: prod
    env:
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.GHA_DEPLOY_ROLE_ARN }}
          role-session-name: pdt-gha-deploy-ec2

      - name: Localizar instância PDT
        id: target
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=pdt" \
              "Name=tag:Environment,Values=prod" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Nenhuma instância PDT em execução encontrada."
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >>"$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Sincronizar scripts (runner → /opt/pdt/scripts)
        id: sync
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ steps.target.outputs.instance_id }}"

          # Tar com todos os .sh (mesma pasta que a EC2 usaria após o git), antes do pull.
          ( cd deploy/server/scripts && find . -maxdepth 1 -name '*.sh' -type f -print0 | tar czf - --null -T - ) > /tmp/pdt-server-scripts.tgz
          B64=$(base64 -w0 < /tmp/pdt-server-scripts.tgz)
          N=${#B64}
          if [ "$N" -gt 200000 ]; then
            echo "::error::Arquivo SSM muito grande ($N b64). Reduza o tar ou use outro meio (S3)."
            exit 1
          fi

          PJSON=$(jq -n --arg b "$B64" '{
            "commands": [
              "set -eu",
              "command -v base64 && command -v tar",
              "install -d -m 0755 /opt/pdt/scripts",
              ("printf %s " + $b + " | base64 -d | tar xzf - -C /opt/pdt/scripts"),
              "chmod 0755 /opt/pdt/scripts/*.sh 2>/dev/null || true"
            ]
          }')

          CMD_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$INSTANCE_ID" \
            --comment "pdt sync scripts #${{ github.run_id }} sha=${{ github.sha }}" \
            --timeout-seconds 300 \
            --parameters "$PJSON" \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >>"$GITHUB_OUTPUT"

      - name: Aguardar sincronização de scripts
        if: success()
        env:
          CMD_ID: ${{ steps.sync.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          for i in $(seq 1 24); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --details --query 'CommandInvocations[0].Status' --output text 2>/dev/null || echo Pending)
            echo "tentativa $i: $STATUS"
            case "$STATUS" in
              Success) exit 0;;
              Failed|Cancelled|TimedOut)
                echo "::error::Falha ao instalar scripts em /opt/pdt/scripts."
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query '[StandardOutputContent, StandardErrorContent, Status, ResponseCode]' --output text
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "::error::Timeout aguardando SSM (scripts)."
          exit 1

      - name: SSM (git + deploy ECR)
        id: send
        env:
          URI: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          REF: ${{ github.sha }}
        run: |
          # SSM AWS-RunShellScript executa em /bin/sh (dash): sem pipefail.
          set -euo pipefail
          PJSON=$(jq -n \
            --arg u "$URI" \
            --arg g "$REF" \
            --arg r "${{ env.AWS_REGION }}" \
            --arg re "${{ github.repository }}" \
            '{
              "commands": [
                "set -eu",
                "export AWS_DEFAULT_REGION=\($r) AWS_REGION=\($r)",
                "command -v docker >/dev/null 2>&1 || { echo ::error::Docker nao esta instalado na EC2. Rode em SSM: bash /opt/pdt/scripts/install-docker-on-ec2.sh; exit 1; }",
                "sudo -u deploy -H git -C /opt/pdt/app config --global --add safe.directory /opt/pdt/app || true",
                ("sudo -u deploy -H /bin/bash -lc " + ( "\"set +e; cd /opt/pdt/app; "
                  + "git remote set-url origin https://github.com/" + $re + ".git; "
                  + "git fetch --unshallow 2>/dev/null; "
                  + "git fetch origin; "
                  + "git fetch origin refs/heads/main:refs/remotes/origin/main 2>/dev/null; "
                  + "git fetch origin " + $g + " 2>/dev/null; "
                  + "if ! git rev-parse -q --verify " + $g + "^{commit} >/dev/null 2>&1; then git fetch --depth=200 origin; fi; "
                  + "if ! git rev-parse -q --verify " + $g + "^{commit} >/dev/null 2>&1; then git fetch --depth=2000 origin; fi; "
                  + "if ! git rev-parse -q --verify " + $g + "^{commit} >/dev/null 2>&1; then git fetch --depth=20000 origin; fi; "
                  + "if ! git rev-parse -q --verify " + $g + "^{commit} >/dev/null 2>&1; then git fetch --depth=100000 origin; fi; "
                  + "if ! git rev-parse -q --verify " + $g + "^{commit} >/dev/null 2>&1; then git fetch --unshallow 2>/dev/null; git fetch origin; git fetch origin " + $g + " 2>/dev/null; fi; "
                  + "set -e; "
                  + "git rev-parse -q --verify " + $g + "^{commit} || { echo ::error::commit_inacessivel_apos_fetch; echo remote=; git remote -v; echo head=; git log -1 --oneline 2>&1; exit 128; }; "
                  + "git reset --hard " + $g + "\"") ),
                "test -f /opt/pdt/scripts/deploy-from-ecr.sh || { echo ::error::Falta_deploy_from_ecr_rode_sincronizar_scripts; ls -la /opt/pdt/scripts 2>&1 || true; exit 1; }",
                "sudo /opt/pdt/scripts/deploy-from-ecr.sh " + $u + " " + $g + " " + $r
              ]
            }')
          CMD_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --comment "pdt ecr #${{ github.run_id }} sha=${{ github.sha }}" \
            --timeout-seconds 1800 \
            --parameters "$PJSON" \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >>"$GITHUB_OUTPUT"

      - name: Aguardar SSM
        if: success()
        env:
          CMD_ID: ${{ steps.send.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          dump_ssm_log() {
            echo "--- stdout (SSM) ---"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text 2>/dev/null || true
            echo "--- stderr (SSM) ---"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text 2>/dev/null || true
            echo "--- StatusDetails (SSM) ---"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StatusDetails' --output text 2>/dev/null || true
            echo "Status: $(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || true)"
            echo "ResponseCode: $(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'ResponseCode' --output text 2>/dev/null || true)"
          }
          for i in $(seq 1 80); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --details --query 'CommandInvocations[0].Status' --output text 2>/dev/null || echo Pending)
            echo "tentativa $i: $STATUS"
            case "$STATUS" in
              Success) exit 0;;
              Failed|Cancelled|TimedOut)
                echo "::error::O comando SSM na EC2 terminou com $STATUS. Causa comum: /opt/pdt/app inexistente, git sem o commit, Docker ausente, Postgres parado, ou deploy-from-ecr (ECR) com erro. Verifique o passo Sincronizar scripts. Saída abaixo."
                dump_ssm_log
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "::error::Timeout aguardando SSM."
          dump_ssm_log
          exit 1

      - name: Smoke test público
        env:
          DOMAIN: ${{ vars.PDT_DOMAIN_NAME }}
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            CODE=$(curl -sk -o /dev/null -w '%{http_code}' "https://$DOMAIN/")
            echo "tentativa $i: HTTP $CODE"
            case "$CODE" in
              200|301|302) exit 0;;
            esac
            sleep 5
          done
          echo "::error::Healthcheck público falhou."
          exit 1
