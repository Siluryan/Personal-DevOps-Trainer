name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: us-east-1
  # Strings simples vão direto.
  TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
  TF_VAR_domain_name:       ${{ vars.PDT_DOMAIN_NAME }}
  TF_VAR_github_repo:       ${{ github.repository }}
  TF_VAR_ssh_public_key:    ${{ vars.PDT_SSH_PUBLIC_KEY }}
  # `operator_cidrs` é list(string); a Variable do GitHub deve já vir em
  # formato JSON, ex.: ["1.2.3.4/32"]. Default vazio é mapeado para "[]".
  TF_VAR_operator_cidrs:    ${{ vars.PDT_OPERATOR_CIDRS || '[]' }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate
      - id: plan
        run: |
          set -eo pipefail
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > tfplan.txt
        continue-on-error: true

      - name: comment plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync(
              `${process.env.GITHUB_WORKSPACE}/deploy/terraform/tfplan.txt`,
              { encoding: 'utf8', flag: 'r' }
            ).slice(0, 60000);
            const body = "### terraform plan\n```diff\n" + out + "\n```";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
        continue-on-error: true

      - if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: deploy/terraform
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform apply -auto-approve -input=false
